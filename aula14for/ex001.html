      display: flex;

      height: 400px;
      width: 400px;
      box-shadow: 0px 0px 10px black;
      border-radius: 20px;
      padding: 30px;
    }
    header, footer{
      margin: 30px 0px;
      color: #ffffff;
    }
    input {
      margin: 10px 0px;
    }
  </style>
</head>
<body>
  <header>Vamos contar</header>
  <section>
    <div class="inputs">

      <input type="number" name="fim" id="fim"><br>
      <label for="passo">Passo:</label>
      <input type="number" name="pas" id="passo"><br>
      <input type="button" value="contar">
    </div>
    <div class="interativo">
      contando...
    </div>
  </section>
  <footer>&copy;Luciano Rodrigues</footer>
