<!DOCTYPE html>
<html lang="pr-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabuada</title>
  <style>
    body {
      background-color: #4d89e1;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-flow: column nowrap;
    }
    section {
      max-width: 400px;
      background-color: #f5f5dc;
     
      box-shadow: 0px 0px 10px black;
      border-radius: 20px;
      padding: 20px;
    }
    header, footer{
      margin: 30px 0px;
      color: #ffffff;
      p{
        font-style: italic;
      }
    }
    input {
      padding: 5px;
      margin: 10px 0px;
      border-radius: 20px;
    }
    label {
      color: #ffffff;
      font-size: 20px;
    }
    div.capsula{
      border-radius: 20px;
      margin: 1px 0px;
      padding: 1px 20px;
      background-color: #037979;
    }
    #butão {
      width: 100%;
      border-radius: 20px;
    }
    #butão:hover {
      color: #ffffff;
      background-color: #010148;
    }
    #interativo{
      display: flex;
      justify-content: center;
      align-items: center;
      flex-flow: column wrap;
      max-width: 100%;
      word-break: break-all;
    }
    strong {
      color: red;
    }

  </style>
</head>
<body>
  <header><h1>Tabuada</h1></header>
  <section>
    <div class="inputs">
      <div class="capsula">
        <label for="num">Numero:</label>
        <input type="number" name="num" id="num" placeholder="Digite um número">
      </div>
      <input id="butão" type="button" value="Open Tabuada">
      
    <div id="resultado">
      <!--Tabuada...-->
    </div>
  </section>
  <footer><p>&copy; Luciano Rodrigues</p></footer>  
</body>
</html>
