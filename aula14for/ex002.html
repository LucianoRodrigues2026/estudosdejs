<!DOCTYPE html>
<html lang="pr-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabuada</title>
  <style>
    body {
      background-color: #4d89e1;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-flow: column nowrap;
    }
    section {
      max-width: 400px;
      background-color: #f5f5dc;
     
      box-shadow: 0px 0px 10px black;
      border-radius: 20px;
      padding: 20px;
    }
    header, footer{
      margin: 30px 0px;
      color: #ffffff;
      p{
        font-style: italic;
      }
    }
    input {
      padding: 5px;
      margin: 5px 0px;
      border-radius: 20px;
    }
    label {
      color: #ffffff;
      font-size: 20px;
    }
    div.capsula{
      border-radius: 20px;
      margin: 10px 0px;
      padding: 1px 20px;
      background-color: #037979;
    }
    #butão {
      width: 100%;
      border-radius: 20px;
    }
    #butão:hover {
      color: #ffffff;
      background-color: #010148;
    }
    #interativo{
      display: flex;
      justify-content: center;
      align-items: center;
      flex-flow: column wrap;
      max-width: 100%;
      word-break: break-all;
    }
    #tabuadaResultado{
      max-width: 105px;
      height: auto;
      border-radius: 10px;      
      color: red;
      
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(10, 1fr);
    }

  </style>
</head>
<body>
  <header><h1>Tabuada</h1></header>
  <section>
    <div class="inputs">
      <div class="capsula">
        <label for="num">Numero:</label>
        <input type="number" name="num" id="num" placeholder="Digite um número">
      </div>
    <div id="resultado">
      <!--Tabuada...-->
      <textarea name="resultado" id="tabuadaResultado"></textarea>
    </div>
    <input id="butão" type="button" value="Open Tabuada" onclick="start()">
  </section>
  <footer><p>&copy; Luciano Rodrigues</p></footer>  
</body>
<script>
  function start(){
    var butão = document.getElementById('butão')
    butão.style.backgroundColor = '#fae572'
    butão.style.color = 'black'

    var num = document.getElementById('num')
    var numero = Number(num.value)    
    var listaTabuada = []

    if(num.value.length == 0){
      window.alert('Digite um número velinho')

    }else {
      for (var numerando = 1; numerando <= 10; numerando ++){
        var mult = numerando * numero
        listaTabuada.push(`${numerando} x ${numero} = ${mult}`)
    }
    }
    var resultado = document.getElementById('tabuadaResultado')
    resultado.innerText = listaTabuada.join(' ')
  }
</script>
</html>
