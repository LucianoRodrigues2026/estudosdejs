<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>javaScript</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    ::-webkit-scrollbar {
      width: 0px;
    }
    body{
      background-image: radial-gradient(circle, rgb(0, 255, 242), rgb(77, 77, 218));
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

    }
    section {
      width: 250px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-flow: column nowrap;
      color: aliceblue;
      background-color: #04044e;
      border-radius: 20px;
      font-variant: small-caps;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bolder;
      box-shadow: 0px 0px 25px #2100b5;
    }
  </style>
</head>
<body>
  <section>
    <h1>Olá  mundo</h1>
    <p>já me livrei da maldição</p>
  </section>
</body>
<script>
    let nome = window.prompt('Qual e o seu nome?')// popup de pergunta e resposta
    window.alert('É um prazer conhecer vc, ' + nome + ' !')//forma concatenada
  </script>
  
</html>
