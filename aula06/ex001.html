<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>javaScript</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    ::-webkit-scrollbar {
      width: 0px;
    }
    body{
      background-image: radial-gradient(circle, blue, rgb(115, 115, 222));
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

    }
    section {
      width: 250px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-flow: column nowrap;
      color: aliceblue;
      background-color: #04044e;
      border-radius: 20px;
      font-variant: small-caps;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bolder;
    }
  </style>
</head>
<body>
  <section>
    <h1>Olá  mundo</h1>
    <p>já me livrei da maldição</p>
  </section>
</body>
<script>
    window.alert('minha primeira mensagem!')//popup de mensagem
    window.confirm('Esta gostando de javaScript?')//popup de inquete
    let nome = window.prompt('Qual e o seu nome?')// popup de pergunta e resposta
    var n1 = Number(window.prompt('Vamos calcular com javascript'))
    var n2 = Number(window.prompt('Vamos la mas um número'))
    var soma = n1 + n2
    window.alert(`${nome}, a soma entre os numeros e igual a ${soma}`)
  </script>
  
</html>
