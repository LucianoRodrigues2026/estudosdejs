<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>troca cor</title>
  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-flow: column nowrap;

    }
    .caixa {
      box-shadow: 0px 0px 10px black;
      width: 100vw;
      height: 100px;
      margin: 10px 0px;
    }
  </style>
</head>
<body onload="start()">
  <div class="caixa" id="cor0"></div>
  <div class="caixa" id="cor1"></div>
  <div class="caixa" id="cor2"></div>
  <div class="caixa" id="cor3"></div>
  <div class="caixa" id="cor4"></div>

  <script>
      function start(){
        tempoDeAnima = setInterval(mudarCor, 1000)
        
        var cor = 0
        function mudarCor(){   
            if (cor == 0){
              var fundo0 = document.getElementById('cor0')
              fundo0.style.backgroundColor = 'red'
            }else if (cor == 1){
              var fundo0 = document.getElementById('cor0')
              var fundo1 = document.getElementById('cor1')
              fundo1.style.backgroundColor = 'blue'
              fundo0.style.display = 'none'
            }else if (cor == 2){
              var fundo1 = document.getElementById('cor1')
              var fundo2 = document.getElementById('cor2')
              fundo2.style.backgroundColor = 'blueviolet'
              fundo1.style.display = 'none'
            }else if (cor == 3){
              var fundo2 = document.getElementById('cor2')
              var fundo3 = document.getElementById('cor3')
              fundo3.style.backgroundColor = 'pink'
              fundo2.style.display = 'none'
            }else if (cor == 4){
              var fundo3 = document.getElementById('cor3')
              var fundo4 = document.getElementById('cor4')
              fundo4.style.backgroundColor = 'purple'
              fundo3.style.display = 'none'
            }else if(cor == 5){
              cor = -1
              var fundo4 = document.getElementById('cor4')
              fundo4.style.display = 'none'
          

            }
         cor ++
        }
      }
  </script>
  
</body>
</html>
