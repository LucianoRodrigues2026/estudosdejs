<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sua idade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1 id="init">Verificador de idade</h1>
    <section>
      <label for="Idade">Ano de nascimento:
      </label>
      <input type="number" name="idade" id="Idade" class="espaço" placeholder="1999">
      <br>

      <p>Sexo:</p>
      <input type="radio" name="genero" id="sexoF" class="espaço">
      <label for="sexoF">Feminino</label>

      <input type="radio" name="genero" id="sexoM" class="espaço" checked>
      <label for="sexoM">Masculino</label>

      <br>
      <input type="button" value="verificar" class="espaço" onclick="clicou()">

      <div class="espaço" id="resultado" >preencha os dados para ver o resultado!</div>
    </section>
    <footer><p>&copy; Luciano Rodrigues</p></footer>
  </main>
  <script src="idadeverificador.js"></script>  
</body>
</html>
