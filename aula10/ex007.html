<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>exercicio006</title>
  <style>
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    div#area {
      font-weight: bolder;
      font-size: 1.8em;
      color: rgb(3, 3, 82);
      background-color: aquamarine;
      width: 200px;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="area" >
    Interaja...

  </div> 
  <script>
    var b = window.document.getElementsByTagName('body')[0]
    var a = window.document.getElementById('area')
    
    a.addEventListener('click', clicou)
    a.addEventListener('mouseenter', entrou)
    a.addEventListener('mouseout', saiu)
    function clicou(){
      a.innerText = 'clicou!'
      a.style.backgroundColor = 'red'
      b.style.backgroundColor = 'black'
    }
  
    function entrou(){
      a.innerText = 'entrou!'
      a.style.backgroundColor = 'magenta'

    }
    function saiu(){
      a.innerText = 'saiu!'
      a.style.backgroundColor = 'blueviolet'
    }
  </script> 
</body>
</html>
