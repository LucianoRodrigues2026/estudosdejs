<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somando js</title>
  <style>
    #numero1 {
      background-color: darkgray;
      width: 100px;
      padding: 5px;
    }
    #numero2{
      background-color: darkgray;
      padding: 5px;
      width: 100px;
    }
    #soma {
      padding: 5px;
      width: 100px;
    }
    #resultado{
      margin-top: 10px;
      padding: 5px;
      width: 335px;
      border: 2px dotted black;
    }
  </style>
</head>
<body>
  <h1>Somando com Javascript</h1>
  <input type="number" name="numero1" id="numero1" placeholder="primeio"> <strong>+</strong>
  <input type="number" name="numero2" id="numero2" placeholder="segudo">
  <input type="button" value="soma" id="soma" onclick="soma()">
  <div id="resultado">Resultado</div>
  <script>
    function soma() {
      var num1 = window.document.getElementById('numero1')
      var num2 = window.document.getElementById('numero2')
      var res = window.document.getElementById('resultado')
      var n1 = Number(num1.value)
      var n2 = Number(num2.value)
      var soma = n1 + n2
      res.innerHTML = `A soma de ${n1} mais ${n2} e =  ${soma}`
    }
  </script>
</body>
</html>
