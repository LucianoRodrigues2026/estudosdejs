<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>números</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    body{
      background-color: #a0def5;
      display: flex;
      justify-content: start;
      align-items: center;
      flex-flow: column nowrap;
      width: 100vw;
      height: 100vh;
      h1 {
        margin: 10px;
        text-shadow: 1px 1px 1px black, -1px 1px 1px black, 1px -1px 1px black, -1px -1px 1px black ;
        font-size: 2.2em;
        color: #ffffff;
        font-weight: bolder;
        font-variant: small-caps;
      }
    }
    section{ 
      position: relative;
      width: 420px;
      height: 290px;
      background-color: white;
      padding: 11px;
      border-radius: 10px;
    }
    select {
      margin: 10px 0px;
      padding: 10px;
      option{
        padding: 1px;
        color: rgb(217, 21, 21);
      }
    }
    #result {
      display: none;
      width: 242px;
      height: 183px;
      position: absolute;
      background-color: #ffffff;
      top: 47px;
      left: 144px;
      padding: 5px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.553);
    }
    
    input {
      padding: 3px;
    }
    .butão:hover {
      background-color: lightgray;
      border: none;
    }
    #finalizar {
      display: block;
    }
  </style>
</head>
<body>

  <h1>Analisandor de Números </h1>

  <section>
    <div id="result"><!--div de resultado--></div>

    <label for="numero">Numero(enter 1 e 100): </label>
    <input type="number" name="numero" id="numero" placeholder="Número">

    <input type="button" value="enviar" class="butão" id="enviar" onclick="enviar()">

    <select name="numeros" id="tela" size="10">
      <option value="">Números Aqui</option>
    </select>

    <input type="button" value="Finalizar" class="butão" id="finalizar" onclick="fim()">

  </section>


  <script>

    var lista = []

    function fim(){
      var resultado = document.getElementById('result')
      resultado.style = 'display:block;'
      resultado.innerHTML = `<p> você adicionol ${lista.length} numeros</p>`
      for (var n = lista; n == resultado.length; n++){

      }
    }


    

    function enviar(){
     // tela.innerHTML = "" //dic que option dentro do selection esta vazio
      var num = document.getElementById('numero').value

      if (num >= 1 && num <= 100){
        if (lista.indexOf(num)){ 
          lista.push(num)
          var tela = document.getElementById('tela')
          var sel = document.createElement('option')
          sel.innerText = `${num} foi adcionado`
          tela.appendChild(sel)
          var resultado = document.getElementById('result')
          resultado.style = 'display:none;'
        }else {
          var resultado = document.getElementById('result')
          resultado.style = 'display:block;'
          resultado.innerHTML = '<p> Esse número ja foi analisado!</p>'  


        }

      }else{
        alert('Obedeça os paremetros!')
      }
      
            

    }

    
  </script>
</body>
</html>
