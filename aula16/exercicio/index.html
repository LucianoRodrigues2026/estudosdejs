<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>números</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    body{
      background-color: #a0def5;
      display: flex;
      justify-content: start;
      align-items: center;
      flex-flow: column nowrap;
      width: 100vw;
      height: 100vh;
      h1 {
        margin: 10px;
        text-shadow: 1px 1px 1px black, -1px 1px 1px black, 1px -1px 1px black, -1px -1px 1px black ;
        font-size: 2.2em;
        color: #ffffff;
        font-weight: bolder;
        font-variant: small-caps;
      }
    }
    section{ 
      position: relative;
      width: 420px;
      height: 290px;
      background-color: white;
      padding: 11px;
      border-radius: 10px;
    }
    select {
      border-color: blue;
      margin: 10px 0px;
      padding: 5px;
      option{
        padding: 1px;
        color: rgb(217, 21, 21);
      }
    }
    #result {
      background-color: #ffffff;
      display: none;
      width: 235px;
      height: 183px;
      position: absolute;
      top: 47px;
      left: 152px;
      padding: 10px;
      text-align: center;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.553);
      flex-flow: column nowrap;
    }
    
    input {
      padding: 3px;
    }
    .butão:hover {
      background-color: lightgray;
      border: none;
    }
    #finalizar {
      display: block;
    }
  </style>
</head>
<body>

  <h1>Analisandor de Números </h1>

  <section>
    <div id="result"><!--div de resultado--></div>

    <label for="numero">Numero(enter 1 e 100): </label>
    <input type="number" name="numero" id="numero" placeholder="Número">

    <input type="button" value="enviar" class="butão" id="enviar" onclick="enviar()">

    <select name="numeros" id="tela" size="10">
      <option value="">Números Aqui</option>
    </select>

    <input type="button" value="Finalizar" class="butão" id="finalizar" onclick="fim()">

  </section>


  <script>
    


    var lista = []
    

    function enviar(){

      var num = document.getElementById('numero').value
      num = Number(num)
        
        
      if (num >= 1 && num <= 100){
        if (lista.indexOf(num) === -1){ 
          lista.push(num)
          var tela = document.getElementById('tela')
          var sel = document.createElement('option')
          sel.innerText = `valor ${num} adcionado`
          tela.appendChild(sel)
          var resultado = document.getElementById('result')
          resultado.style = 'display:none;'
        }else {
          var resultado = document.getElementById('result')
          resultado.style = 'display:block;'
          resultado.style.backgroundColor = 'red'
          resultado.style.color = '#fff'
          resultado.innerHTML = '<h1> Esse número ja foi analisado!</h1>'  


        }

        }else{
          alert('Obedeça os paremetros!')
        }      

    }
    
    var soma = 0 

    function fim(){
      
      if (lista.length == 0){

        alert('você precissa selecionar um número')

      }else{
        /*O perigo do <=: Se uma lista tem 3 elementos, os índices dela são 0, 1 e 2. Se você usar indice <= lista.length q e igual 3, o loop vai tentar puxar o índice 3 que não existe*/
        for (var indice = 0; indice < lista.length; indice++){
        soma += lista[indice]

        }
        var media = soma / lista.length

        var resultado = document.getElementById('result')
        resultado.style = 'display:flex;'
        resultado.style.justifyContent = 'center'
        resultado.style.alignItems = 'center'
      // numca esqueser que += com string serve par concatenar
        resultado.innerHTML = `<p> Você cadrastou ${lista.length} numeros!</p>`
        resultado.innerHTML += `<p> A soma dos números e ${soma}!</p>`
        resultado.innerHTML += `<p> E essa e a media ${media}!</p>`

      }

      
    }

    
  </script>
</body>
</html>
