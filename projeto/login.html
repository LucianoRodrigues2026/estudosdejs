<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bolder;
    }
    body{
      background-image: url('img/Gemini_Generated_Image_yfgztlyfgztlyfgz.png');
      background-size: cover;
      background-position: center center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
   
    section {
      max-width: 250px;
      box-shadow: 0px 0px 20px black;
      background-color: #ffffff6e;
      p{
        margin-top: 4px;
        margin-left: 10px;
      }

    }
    div {
      width: 250px;
      height: 100px;
      overflow: hidden;
      background-image: url('img/logodiv.png');
      background-size: cover;
      background-position: center center;
    }
    #butão {
      width: 72%;
      padding: 5px;
      display: block;
    }
    #butão:hover {
      background-color: #92d1ff;
    }
    input {
      margin: 10px 30px;
      padding: 6px;
    }
  </style>
</head>
<body>
  <!--logn simpes-->
  <section>

    <div></div>

    <form>

      <input type="text" name="login" id="login" placeholder="Usuario" autocomplete="on">

      <input type="password" name="password" id="senha" placeholder="senha" required>
         
      <input type="submit" value="Login" id="butão" onclick="login()">
    </form>
  </section>




  <script>



    function login(event){

      preventDefalt();
      
      var usuario = document.getElementById('login').value;
      var senha = document.getElementById('senha').value;

      if (usuario == 'admin' && senha == 'admin'){
        window.alert('login feito com sucesso!')
        location.href = 'pedidos.html';
      }else{
        window.alert('Senha ou Usuário INVALIDOS')
      }
    }


  </script>  


</body>
</html>
