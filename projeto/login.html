<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login</title>
  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bolder;
    }
    body{
      background-image: url('img/Gemini_Generated_Image_yfgztlyfgztlyfgz.png');
      background-size: cover;
      background-position: center center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
   
    section {
      max-width: 400px;
      box-shadow: 0px 0px 20px black;
      background-color: #ffffff6e;
      p{
        margin-top: 4px;
        margin-left: 10px;
      }

    }
    div {
      width: 250px;
      height: 100px;
      overflow: hidden;
      background-image: url('img/logodiv.png');
      background-size: cover;
      background-position: center center;
    }
    #butão {
      margin: 10px;
      padding: 5px;
      display: block;
      justify-self: center;

    }
    input {
      margin: 0px 30px;
      padding: 6px;
    }
  </style>
</head>
<body>
  <!--logn simpes-->
  <section>
    <div>

    </div>
    <form action="beckbasico.js" method="post">
      <p>Usuario:</p>
      <input type="text" name="log" id="login" placeholder="Nome Usuario" required>
      <p>Senha:</p>
      <input type="password" name="password" id="Senha" placeholder="senha">
         
      <input type="button" value="login" onclick="login()" id="butão">
    </form>
  </section>
  <script>
    function login(){
      let usuario = document.getElementById('login')
      let senha = document.getElementById('Senha')

      if(usuario.value.length == 0 || senha.value.length == 0){
        window.alert('preencha usuario e senha')

      }else if (usuario === 'admin@' && senha === 'admin'){
        window.alert('login feito com sucesso!')
        

      }else{
        window.alert('Senha ou Usuário INVALIDOS')
      }
    }
  </script>  
</body>
</html>
